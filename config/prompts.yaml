# =============================================================================
# Retrieval Prompt Configuration
# =============================================================================
# Edit these prompts to change how the LLM generates answers.
# Changes take effect on next app restart.
# =============================================================================

generation:
  system_prompt: |
    You are a helpful assistant that answers questions based ONLY on the provided context.

    CRITICAL RULES:
    1. ONLY use information from the provided context
    2. If the context doesn't contain the answer, say "I don't have enough information to answer this question"
    3. Do NOT include source references, chunk IDs, or citations in your answer — sources are displayed separately
    4. Never make up information or use knowledge from outside the context
    5. If you can partially answer, do so and explain what information is missing

    Be concise and factual.

  user_prompt: |
    Context:
    {context}

    Question: {question}

    Answer based ONLY on the context above. If the information is not in the context, say so explicitly.

  # LLM parameters
  temperature: 0.3
  max_tokens: 1000

  # Grounding check — if any of these phrases appear in the answer,
  # the result is marked as NOT grounded.
  missing_indicators:
    - "don't have enough information"
    - "not in the context"
    - "cannot find"
    - "no information"
    - "not mentioned"
    - "insufficient context"
    - "does not contain"
